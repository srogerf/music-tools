all:
  children:
    music_tools_hosts:
      hosts:
        music-tools-oci:
          # Start a Bastion tunnel first:
          #
          #   bash bin/oci_bastion_ssh.sh --no-ssh
          #
          # Then copy this file to .private/ansible/hosts.yml and use:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          ansible_user: opc
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

          postgres_data_path: /srv/rifferone/postgres-data
          app_runtime_path: /srv/rifferone/app
