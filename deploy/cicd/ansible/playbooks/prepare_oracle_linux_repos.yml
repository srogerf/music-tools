---
- name: Prepare Oracle Linux repos for proxied bootstrap
  hosts: music_tools_hosts
  become: true
  gather_facts: true

  vars:
    bootstrap_proxy_url: "{{ lookup('env', 'BOOTSTRAP_PROXY_URL') | default('', true) }}"
    bootstrap_proxy_environment: "{{ {'http_proxy': bootstrap_proxy_url, 'https_proxy': bootstrap_proxy_url, 'HTTP_PROXY': bootstrap_proxy_url, 'HTTPS_PROXY': bootstrap_proxy_url} if bootstrap_proxy_url | length > 0 else {} }}"

  environment: "{{ bootstrap_proxy_environment }}"

  tasks:
    - name: Confirm supported OS family
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
        fail_msg: "This playbook currently supports Oracle Linux / RHEL-family hosts only."

    - name: Prepare Oracle Linux repos
      ansible.builtin.import_tasks: ../tasks/prepare_oracle_linux_repos.yml
