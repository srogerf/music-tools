server {
    listen 80;
    server_name _;

    client_max_body_size 1m;
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 15s;
    limit_req zone=per_ip burst=20 nodelay;
    limit_req_status 429;
    limit_conn per_ip_conn 20;
    limit_conn_status 429;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /favicon.ico {
        types {}
        default_type image/x-icon;
        alias /etc/nginx/assets/favicon.ico;
    }

    location = /favicon.png {
        types {}
        default_type image/png;
        alias /etc/nginx/assets/favicon.png;
    }

    location ~* /\.(git|env|aws|ssh|svn|hg|bzr) {
        access_log off;
        return 404;
    }

    location ~* /(wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|adminer|\.env|composer\.(json|lock)|package-lock\.json|yarn\.lock)$ {
        access_log off;
        return 404;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://rifferone:8080;
    }
}
