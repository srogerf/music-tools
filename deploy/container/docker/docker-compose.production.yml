services:
  rifferone:
    container_name: rifferone
    image: ${RIFFERONE_IMAGE}
    command:
      - -addr
      - :8080
      - -postgres-config
      - ""
      - -static-dir
      - /app/frontend/app
      - -fretboard-dir
      - ""
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGSSLMODE: disable
    ports:
      - "${RIFFERONE_HTTP_PORT:-8080}:8080"

  postgres:
    container_name: postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - "${POSTGRES_DATA_PATH:-/srv/rifferone/postgres-data}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
