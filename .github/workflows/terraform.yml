name: Terraform

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: OCI State Bootstrap
            directory: deploy/infrastructure/oci/bootstrap
          - name: OCI Infrastructure
            directory: deploy/infrastructure/oci/app

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove remote backend for validation
        if: matrix.directory == 'deploy/infrastructure/oci/app'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("versions.tf")
          path.write_text(path.read_text().replace('\n  backend "oci" {}\n', '\n'))
          PY

      - name: Check formatting
        run: terraform fmt -check

      - name: Initialize providers
        run: terraform init -backend=false

      - name: Validate configuration
        run: terraform validate
