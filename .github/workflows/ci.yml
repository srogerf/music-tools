name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Targeted Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run targeted Go tests
        run: |
          go test ./api ./db/postgres ./src/chords ./src/postgresdb ./src/tuning
          go test ./src/scales -run 'Test(EnrichDefinitions|ContextForScale)'
